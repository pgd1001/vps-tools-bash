# VPS Tools Cron Configuration

Install as `/etc/cron.d/vps-tools`:

```bash
# VPS Tools Automated Maintenance Schedule
# Lines starting with # are comments
# Format: minute hour day month weekday command

# EMAIL ALERTS
MAILTO=admin@example.com

# MONITORING (Every 5 minutes)
*/5 * * * * root bash /opt/vps-tools/monitoring/vps-health-monitor.sh >> /var/log/vps-tools/health-cron.log 2>&1
*/5 * * * * root bash /opt/vps-tools/monitoring/vps-service-monitor.sh >> /var/log/vps-tools/service-cron.log 2>&1

# LOGGING & SECURITY (Daily at 2 AM)
0 2 * * * root bash /opt/vps-tools/monitoring/vps-log-analyzer.sh --days=7 >> /var/log/vps-tools/logs-cron.log 2>&1
0 2 * * * root bash /opt/vps-tools/security/vps-failed-login-reporter.sh --days=7 >> /var/log/vps-tools/login-cron.log 2>&1

# SECURITY AUDITS (Weekly on Sunday at 3 AM)
0 3 * * 0 root bash /opt/vps-tools/security/vps-ssh-audit.sh --audit >> /var/log/vps-tools/ssh-audit-cron.log 2>&1
0 3 * * 0 root bash /opt/vps-tools/security/vps-ssl-checker.sh >> /var/log/vps-tools/ssl-cron.log 2>&1
30 3 * * 0 root bash /opt/vps-tools/security/vps-open-ports-auditor.sh >> /var/log/vps-tools/ports-cron.log 2>&1

# BACKUPS (Daily at 1 AM)
0 1 * * * root bash /opt/vps-tools/monitoring/vps-backup-verifier.sh >> /var/log/vps-tools/backup-verify-cron.log 2>&1
30 1 * * * root bash /opt/vps-tools/maintenance/vps-database-backup.sh --type=all --retention=30 >> /var/log/vps-tools/db-backup-cron.log 2>&1

# DOCKER MAINTENANCE (Daily at 4 AM)
0 4 * * * root bash /opt/vps-tools/docker/vps-docker-health.sh >> /var/log/vps-tools/docker-health-cron.log 2>&1
30 4 * * * root bash /opt/vps-tools/docker/vps-docker-cleanup.sh --aggressive >> /var/log/vps-tools/docker-cleanup-cron.log 2>&1
0 5 * * * root bash /opt/vps-tools/docker/vps-docker-log-rotation.sh >> /var/log/vps-tools/docker-logs-cron.log 2>&1

# SYSTEM MAINTENANCE (Daily at 5 AM)
0 5 * * * root bash /opt/vps-tools/maintenance/vps-automated-cleanup.sh --aggressive >> /var/log/vps-tools/cleanup-cron.log 2>&1

# PACKAGE UPDATES (Daily at 6 AM)
0 6 * * * root bash /opt/vps-tools/maintenance/vps-package-updater.sh --check >> /var/log/vps-tools/updates-cron.log 2>&1

# CONTAINER BACKUPS (Weekly on Monday at 11 PM)
0 23 * * 1 root bash /opt/vps-tools/docker/vps-docker-backup-restore.sh --mode=backup --containers=all --backup-dir=/opt/backups >> /var/log/vps-tools/docker-backup-cron.log 2>&1

# FULL SYSTEM REPORT (Weekly on Sunday at 8 AM)
0 8 * * 0 root bash /opt/vps-tools/orchestration/vps-orchestration.sh --mode=report >> /var/log/vps-tools/report-cron.log 2>&1
```

## Installation

```bash
sudo cp vps-tools-cron.conf /etc/cron.d/vps-tools
sudo chmod 644 /etc/cron.d/vps-tools
```

## Customization

Edit `/etc/cron.d/vps-tools` directly with:
```bash
sudo nano /etc/cron.d/vps-tools
```

Verify cron syntax:
```bash
sudo crontab -l  # View crontab
journalctl -u cron --follow  # Monitor cron execution
```

## Schedule Notes

- **Monitoring**: 5-minute intervals detect issues quickly
- **Backups**: Run during off-peak hours (1-5 AM)
- **Security audits**: Weekly to limit resource usage
- **Cleanup**: Before business hours to minimize impact
- **Reports**: Sunday morning for weekly summary

## Alert Configuration

Set `MAILTO` to receive cron output emails on errors. Test with:
```bash
echo "Test email" | mail -s "Test" your-email@example.com
```